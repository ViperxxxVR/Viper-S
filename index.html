<script> function register() { let username = document.getElementById("username").value; localStorage.setItem("username", username)} function lookupRoblox() {
let robloxUsername = document.getElementById("roblox").value;
 const data = {
     usernames: [robloxUsername],
      excludeBannedUsers: true};
fetch("https://users.roproxy.com/v1/usernames/users", {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(data)
})
.then(response => response.json())
.then(data => console.log(data))
}
</script>
