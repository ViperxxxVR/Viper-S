 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, 
#0b0f1a, 
#05070d);
  color: white;
  overflow: hidden;
}
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -1;
}
.circle {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.5;
  animation: float 12s infinite ease-in-out alternate;
}
.circle1 {
  width: 300px;
  height: 300px;
  background: purple;
  top: 20%;
  left: 10%;
}
.circle2 {
  width: 400px;
  height: 400px;
  background: 
#3b82f6;
  top: 60%;
  left: 60%;
}
.circle3 {
  width: 250px;
  height: 250px;
  background: white;
  bottom: 10%;
  right: 10%;
}
@keyframes float {
  from { transform: translateY(0px) translateX(0px); }
  to { transform: translateY(-40px) translateX(40px); }
}
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  gap: 20px;
}
h1 {
  font-size: 48px;
  margin: 0;
}
.card {
  background: 
#0d1117;
  padding: 30px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 320px;
}
input {
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: 
#0b0f1a;
  color: white;
  padding: 12px;
  font-size: 14px;
}
button {
  border-radius: 10px;
  border: none;
  background: 
#3b82f6;
  color: white;
  padding: 12px;
  cursor: pointer;
}
button:hover {
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="bg">
  <div class="circle circle1"></div>
  <div class="circle circle2"></div>
  <div class="circle circle3"></div>
</div>
<div class="container">
  <h1>Viper Studios</h1>
  <div class="card">
    <input type="text" placeholder="Username" id="username">
    <input type="text" placeholder="Roblox User ID" id="roblox">
    <input type="password" placeholder="Password" id="password">
    <button onclick="register()">Register</button>
  </div>
</div>
<script>
function register() {
  let username = document.getElementById("username").value;
  let roblox = document.getElementById("roblox").value;
  localStorage.setItem("username", username);
  localStorage.setItem("roblox", roblox);
  window.location.href = "register.html";
}
</script>
</body>
</html>
