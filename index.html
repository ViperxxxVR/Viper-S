<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viper Studios - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#0b0f1a,#05070d);
  color:white;
}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:20px;
}

.card{
  background:#0d1117;
  padding:25px;
  border-radius:16px;
  width:320px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0b0f1a;
  color:white;
}

button{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.info{
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
  text-align:center;
  max-width:320px;
}
</style>
</head>

<body>

<div class="center">
  <h1>Viper Studios</h1>

  <div class="card">
    <input id="username" placeholder="Username" />
    <input id="roblox" placeholder="Roblox User ID (optional)" />
    <input id="password" type="password" placeholder="Password (not used yet)" />
    <button onclick="login()">Login / Register</button>
  </div>

  <p class="info">
    Adding your roblox ID is an optional feature but grants you more features!
  </p>
</div>

<script>
function login(){
  let username = document.getElementById("username").value.trim();
  let roblox = document.getElementById("roblox").value.trim();

  if(!username){
    alert("Enter username");
    return;
  }

  localStorage.setItem("username", username);
  localStorage.setItem("roblox", roblox);

  window.location.href = "register.html";
}
</script>

</body>
</html>
