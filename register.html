<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>

<div class="glow"></div>
<div class="glow2"></div>
<div class="glow3"></div>

<div class="layout">
  <div class="sidebar">
   <button onclick="showProfile()">Profile</button>
<button onclick="showSettings()">Profile Settings</button>
<button>Users (SOON!)</button>
  </div>
  <div class="main" id="main">
  <div id="profile-tab">
    <img id="avatar" src="">
    <h1 id="welcome">Welcome!</h1>
  </div>
  <div id="settings-tab">
    <textarea id="bio-input" placeholder="Write your bio here..."></textarea>
<button onclick="saveBio()">Save Bio</button>
  </div>
</div>
<script>let username = localStorage.getItem("username"); document.getElementById("welcome") .innerHTML = "Welcome, " + username
let roblox = localStorage.getItem("roblox"); fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${roblox}&size=420x420&format=Png`)
.then(response => response.json())
.then(data => document.getElementById("avatar").src = data.data[0].imageUrl) 

function showProfile() {
  document.getElementById("profile-tab").style.display = "block";
  document.getElementById("settings-tab").style.display = "none";
} 

function showSettings() {
  document.getElementById("profile-tab").style.display = "none";
  document.getElementById("settings-tab").style.display = "block";
}

function saveBio() { let bio = document.getElementById("bio-input").value;
localStorage.setItem("bio", bio);}
  </script>
  </div>
</div>



<style>body { 
             background: linear-gradient(to right, black, #1a0a2e);
}

h1 {
           font-size: 70px;
background:linear-gradient(to right, white, #6B6E6B);

-webkit-background-clip: text; background-clip: text; 
color: transparent;
} .glow {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    opacity: 0.9;
    filter: blur(80px);
     background-color: white;
    position: fixed;
    bottom: 0;
    right: 0;

}

.glow2 {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    opacity: 0.5;
    filter: blur(120px);
    background-color: purple;
    position: fixed;
    top: 70%;
    left: 50%;
}

.glow3 {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    opacity: 0.5;
    filter: blur(120px);
    background-color: purple;
    position: fixed;
    top: 50%;
    left: 10%;
}

.layout {
       display: flex;
       flex-direction: row;
}

.sidebar{
    width: 300px;
    background:linear-gradient(gray,black);
    height:100vh;
    display: flex;
    flex-direction: column;
    gap: 7px
}
.sidebar button{
    border-radius: 10%;
    height: 5%;
    font-size: 100%;
    font-family: "Fredoka", sans-serif;
    background-color:skyblue
}
</style>
