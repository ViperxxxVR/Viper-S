<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0b0f1a, #05070d);
  color: white;
}

.container {
  display: flex;
}


.sidebar {
  width: 240px;
  height: 100vh;
  background: #0d1117;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar h2 {
  font-size: 18px;
  opacity: 0.8;
}

.sidebar button {
  background: transparent;
  border: none;
  color: white;
  text-align: left;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.sidebar button:hover {
  background: rgba(255,255,255,0.08);
}

.active {
  background: rgba(255,255,255,0.1);
}


.main {
  flex: 1;
  padding: 30px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 28px;
  margin: 0;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #0d1117;
  padding: 20px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}

.card small {
  opacity: 0.6;
}


#profile-tab {
  display: block;
}

#settings-tab {
  display: none;
}

.avatar {
  width: 120px;
  border-radius: 50%;
  margin-top: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: white;
  padding: 10px;
}

button.save {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>
<div class="container">

  <div class="sidebar">
    <h2>Viper Studios</h2>
    <button onclick="showProfile()" class="active">Home</button>
    <button onclick="showSettings()">Settings</button>
    <button disabled>Users (Soon)</button>
  </div>

  <div class="main">
    <div class="header">
      <h1 id="welcome">Welcome</h1>
    </div>

    <div class="cards" id="cards"></div>

   
    <div id="profile-tab">
      <img id="avatar" class="avatar" src="">
      <p id="bio-display"></p>
    </div>

    
    <div id="settings-tab">
      <textarea id="bio-input" placeholder="Write your bio..."></textarea>
      <button class="save" onclick="saveBio()">Save</button>
    </div>

  </div>
</div>

<script>
let username = localStorage.getItem("username") || "User";
document.getElementById("welcome").innerText = `Welcome back, ${username}`;

let roblox = localStorage.getItem("roblox");
if (roblox) {
  fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${roblox}&size=420x420&format=Png`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("avatar").src = data.data[0].imageUrl;
  });
}

function showProfile() {
  document.getElementById("profile-tab").style.display = "block";
  document.getElementById("settings-tab").style.display = "none";
}

function showSettings() {
  document.getElementById("profile-tab").style.display = "none";
  document.getElementById("settings-tab").style.display = "block";
}

function saveBio() {
  let bio = document.getElementById("bio-input").value;
  localStorage.setItem("bio", bio);
  document.getElementById("bio-display").innerText = bio;
}

function addCard(title, value) {
  let cards = JSON.parse(localStorage.getItem("cards") || "[]");
  cards.push({title, value});
  localStorage.setItem("cards", JSON.stringify(cards));
  renderCards();
}

function renderCards() {
  let container = document.getElementById("cards");
  container.innerHTML = "";
  let cards = JSON.parse(localStorage.getItem("cards") || "[]");
  cards.forEach(c => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<small>${c.title}</small><h2>${c.value}</h2>`;
    container.appendChild(div);
  });
}

renderCards();

// Load saved bio
document.getElementById("bio-display").innerText = localStorage.getItem("bio") || "";
document.getElementById("bio-input").value = localStorage.getItem("bio") || "";
</script>

</body>
</html>
