<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viper Studios - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#0b0f1a,#05070d);
  color:white;
  overflow:hidden;
}

.container{
  display:flex;
  height:100vh;
}

.sidebar{
  width:240px;
  background:#0d1117;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar button{
  background:transparent;
  border:none;
  color:white;
  text-align:left;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.sidebar button:hover{
  background:rgba(255,255,255,0.08);
}

.main{
  flex:1;
  padding:30px;
}

.avatar{
  width:120px;
  border-radius:50%;
  margin-top:20px;
}

textarea{
  width:100%;
  height:120px;
  background:#0d1117;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  color:white;
  padding:10px;
}

.hidden{
  display:none;
}

.info{
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<script>
// redirect if not logged in
if(!localStorage.getItem("username")){
  window.location.href = "index.html";
}
</script>

<div class="container">

  <div class="sidebar">
    <h3>Viper Studios</h3>
    <button onclick="show('home')">Home</button>
    <button onclick="show('settings')">Settings</button>
    <button onclick="show('users')">Users</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <h1 id="welcome"></h1>

    <p class="info">
      Adding your roblox ID is an optional feature but grants you more features!
    </p>

    <div id="home">
      <img id="avatar" class="avatar" />
      <p id="bioDisplay"></p>
    </div>

    <div id="settings" class="hidden">
      <textarea id="bioInput"></textarea>
      <button onclick="saveBio()">Save</button>
    </div>

    <div id="users" class="hidden">
      <h3>Users</h3>
      <p class="info">Coming soon.</p>
    </div>

  </div>

</div>

<script>
let username = localStorage.getItem("username");
let roblox = localStorage.getItem("roblox");

document.getElementById("welcome").innerText = `Welcome back, ${username}`;

if(roblox){
  document.getElementById("avatar").src =
  `https://www.roblox.com/headshot-thumbnail/image?userId=${roblox}&width=420&height=420&format=png`;
}

function show(tab){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("settings").classList.add("hidden");
  document.getElementById("users").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}

function saveBio(){
  let bio = document.getElementById("bioInput").value;
  localStorage.setItem("bio", bio);
  document.getElementById("bioDisplay").innerText = bio;
}

function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

// load saved bio
let bio = localStorage.getItem("bio") || "";
document.getElementById("bioInput").value = bio;
document.getElementById("bioDisplay").innerText = bio;
</script>

</body>
</html>
