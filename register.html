<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viper Studios - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#0b0f1a,#05070d);
  color:white;
  overflow:hidden;
}

.container{
  display:flex;
  height:100vh;
}

.sidebar{
  width:240px;
  background:#0d1117;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar button{
  background:transparent;
  border:none;
  color:white;
  text-align:left;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.sidebar button:hover{
  background:rgba(255,255,255,0.08);
}

.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

/* 🌈 Animated glow profile card */
@keyframes glow {
  0% { box-shadow: 0 0 10px rgba(59,130,246,0.2); }
  50% { box-shadow: 0 0 25px rgba(59,130,246,0.6); }
  100% { box-shadow: 0 0 10px rgba(59,130,246,0.2); }
}

.profile-card{
  background:#0d1117;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:20px;
  max-width:520px;
  animation:glow 3s infinite ease-in-out;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid rgba(59,130,246,0.6);
}

.profile-info h2{
  margin:0;
  font-size:22px;
}

.profile-info p{
  margin:5px 0;
  opacity:0.7;
  font-size:13px;
}

.badge{
  display:inline-block;
  margin-top:6px;
  padding:4px 10px;
  font-size:12px;
  border-radius:999px;
  background:rgba(59,130,246,0.2);
  color:#60a5fa;
}

.status{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  margin-top:6px;
  opacity:0.8;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 8px #22c55e;
}

textarea{
  width:100%;
  height:120px;
  background:#0d1117;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  color:white;
  padding:10px;
}

.hidden{display:none;}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

.info{
  font-size:13px;
  opacity:0.7;
  margin-top:10px;
}

</style>
</head>
<body>

<script>
if(!localStorage.getItem("username")){
  window.location.href="index.html";
}
</script>

<div class="container">

  <div class="sidebar">
    <h3>Viper Studios</h3>
    <button onclick="show('home')">Home</button>
    <button onclick="show('settings')">Settings</button>
    <button onclick="show('users')">Users</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <h1 id="welcome"></h1>

    <p class="info">Adding your roblox ID is an optional feature but grants you more features!</p>

    <!-- HOME -->
    <div id="home">

      <div class="profile-card">
        <img id="avatar" class="avatar" />

        <div class="profile-info">
          <h2 id="nameDisplay"></h2>
          <p>ID: <span id="robloxDisplay">None</span></p>

          <div class="status">
            <div class="dot"></div>
            <span>Online</span>
          </div>

          <span class="badge" id="rankBadge">User</span>
        </div>
      </div>

      <p id="bioDisplay" style="margin-top:15px;"></p>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="hidden">
      <textarea id="bioInput"></textarea>
      <button onclick="saveBio()">Save</button>
    </div>

    <!-- USERS -->
    <div id="users" class="hidden">
      <h3>Users</h3>
      <p class="info">Coming soon.</p>
    </div>

  </div>

</div>

<script>
let username = localStorage.getItem("username");
let roblox = localStorage.getItem("roblox");
let rank = localStorage.getItem("rank") || "User";
localStorage.setItem("rank", rank);

// UI fill
document.getElementById("welcome").innerText = `Welcome back, ${username}`;
document.getElementById("nameDisplay").innerText = username;
document.getElementById("robloxDisplay").innerText = roblox || "Not set";
document.getElementById("rankBadge").innerText = rank;

// avatar
if(roblox){
  fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${roblox}&size=420x420&format=Png`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("avatar").src = data.data[0].imageUrl;
    })
    .catch(()=>{
      document.getElementById("avatar").src = "https://tr.rbxcdn.com/default_avatar.png";
    });
}

function show(tab){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("settings").classList.add("hidden");
  document.getElementById("users").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

function saveBio(){
  let bio = document.getElementById("bioInput").value;
  localStorage.setItem("bio",bio);
  document.getElementById("bioDisplay").innerText = bio;
}

function logout(){
  localStorage.clear();
  window.location.href="index.html";
}

let bio = localStorage.getItem("bio") || "";
document.getElementById("bioInput").value = bio;
document.getElementById("bioDisplay").innerText = bio;
</script>

</body>
</html>
